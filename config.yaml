book:
  title: ""
  author: "AutoTex"
  language: "english"
  chapters: []

api:
  gemini_model: "gemini-3-pro-image-preview"
  # API key read from environment variable: GOOGLE_API_KEY

kdp:
  enabled: true
  # Trim size: pocket, digest, novel, royal, crown, large, letter, ustrade, uktrade
  trim_size: "novel"       # 6x9 inches (most common for scientific books)
  bleed: false             # true if images extend to page edge
  gutter: ""               # override gutter (e.g. "0.5in"), empty = auto 0.375in
  paper: "white"           # white or cream

latex:
  compiler: "pdflatex"
  compiler_args:
    - "-interaction=nonstopmode"
    - "-halt-on-error"
  root_file: "main.tex"
  output_dir: "build"

review:
  max_revision_iterations: 3
  review_dpi: 200
  pages_per_review: 2
  final_review_interval: 5
